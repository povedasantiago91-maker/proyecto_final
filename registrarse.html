<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Vitalora</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="icon" href="img/favicon.png" type="image/png">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- CONTENIDO -->
<section id="registro">
    <h2>Registro de Usuario</h2>

    <form>
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre">
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="Ingresa tu email">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
        </div>

        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu contraseña">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="terminos">
            <label class="form-check-label" for="terminos">Acepto los términos y condiciones</label>
        </div>

        <button type="submit" class="btn btn-primary btn-register">Registrarme</button>
    </form>
<div class="boton-inicio-sesion">
        <p class="mt-3 text-center">
        ¿Ya tienes una cuenta?
        <a href="iniciar_sesion.html">Inicia sesión</a>
    </p>
</div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->

<script src="script.js"></script>
</body>
</html>
