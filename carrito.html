<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito - Vitalora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/favicon.png" type="image/png">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar"></div>

<div class="container mt-5">

    <h2 class="text-center">🛒 Carrito de Compras</h2>

    <div id="carrito"></div>

    <h3 id="total" class="text-end mt-4"></h3>

    <div class="text-center mt-3">
        <button class="btn btn-danger" onclick="vaciar()">Vaciar carrito</button>
    </div>

</div>

<!-- 🔥 FOOTER -->
<div id="footer"></div>

<!-- 🔥 SCRIPT GENERAL (MUY IMPORTANTE) -->
<script src="script.js"></script>


<script>

document.addEventListener("DOMContentLoaded", function () {
    cargarCarrito();
});

function cargarCarrito() {

    const contenedor = document.getElementById("carrito");
    const totalBox = document.getElementById("total");

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    console.log("Carrito leído:", carrito);

    if (carrito.length === 0) {
        contenedor.innerHTML = "<h4 class= 'carrito-vacio text-center'>El carrito está vacío</h4>";
        totalBox.innerText = "Total: $0";
        return;
    }

    let html = "";
    let total = 0;

    carrito.forEach((item, index) => {

        total += Number(item.precio);

        html += `
            <div class="card p-3 m-2 shadow">
                <h5>${item.nombre}</h5>
                <p>$${item.precio}</p>
                <button class="btn btn-danger" onclick="eliminar(${index})">
                    Eliminar
                </button>
            </div>
        `;
    });

    contenedor.innerHTML = html;
    totalBox.innerText = "Total: $" + total;
}


// ❌ eliminar uno
function eliminar(index) {

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    carrito.splice(index, 1);

    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarCarrito();
    cargarCarrito();
}


// 🧹 vaciar todo
function vaciar() {

    localStorage.removeItem("carrito");
    actualizarCarrito();
    cargarCarrito();
}

</script>

<div id="toast"></div>
</body>
</html>
