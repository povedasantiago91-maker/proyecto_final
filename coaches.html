<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios - Vitalora</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- CONTENIDO -->
<section id="coaches">

    <h2>Servicios</h2>

    <div class="servicios-grid">

        <div class="servicio-card" onclick="verProductos()">
            <img src="img/productos.png" alt="Productos">
            <div class="overlay">
                <h3>🧴 Productos</h3>
            </div>
        </div>

        <div class="servicio-card" onclick="verCoaches()">
            <img src="img/coaches.png" alt="Coaches">
            <div class="overlay">
                <h3>🏋️ Coaches</h3>
            </div>
        </div>

    </div>

</section>

<!-- RESULTADOS -->
<div id="contenido"></div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- TU SCRIPT GENERAL (navbar/footer) -->
<script src="script.js"></script>

<!-- 🔐 PROTEGER LA PÁGINA -->
<script>
fetch("/usuario", { credentials: "include" })
.then(res => res.json())
.then(user => {
    if (!user) {
        window.location.href = "iniciar_sesion.html?redirect=coaches.html";
    }
});
</script>

<!-- 🚀 FUNCIONALIDAD CATÁLOGOS -->
<script id="filterprod">

function verProductos() {
    fetch("/productos", {
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {

        let html = `
            <h3 class="text-center">Productos</h3>

            <div class="text-center mb-3">
                <button class="btn btn-outline-primary m-1" onclick="filtrar('Todos')">Todos</button>
                <button class="btn btn-outline-primary m-1" onclick="filtrar('Keratina')">Keratinas</button>
                <button class="btn btn-outline-primary m-1" onclick="filtrar('Ropa')">Ropa</button>
            </div>

            <div class="row" id="listaProductos"></div>
        `;

        document.getElementById("contenido").innerHTML = html;

        mostrarProductos(data);
        window.productosGlobal = data; // guardar datos
    });
}

function mostrarProductos(data) {
    let html = "";

    data.forEach(p => {
        html += `
            <div class="col-md-4">
                <div class="card p-3 m-2 shadow">
                    <h5>${p.nombre}</h5>
                    <p><strong>$${p.precio}</strong></p>
                    <span class="badge bg-primary">${p.categoria}</span>
                    <button class="btn btn-success mt-2" onclick="comprar('${p.nombre}',${p.precio})">
                        Comprar
                    </button>
                </div>
            </div>
        `;
    });

    document.getElementById("listaProductos").innerHTML = html;
}

function filtrar(categoria) {
    if (categoria === "Todos") {
        mostrarProductos(window.productosGlobal);
    } else {
        const filtrados = window.productosGlobal.filter(p => p.categoria === categoria);
        mostrarProductos(filtrados);
    }
}

function comprar(nombre, precio) {

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    carrito.push({
        nombre: nombre,
        precio: precio
    });

    localStorage.setItem("carrito", JSON.stringify(carrito));

    alert("🛒 Agregado al carrito: " + nombre);
}
</script>

<script id="filtercoach">

function verCoaches() {
    fetch("/coaches")
    .then(res => res.json())
    .then(data => {

        let html = `
            <h3 class="text-center">Coaches</h3>

            <div class="text-center mb-3">
                <input type="text" id="busqueda" placeholder="Buscar ciudad..." class="form-control w-50 mx-auto">
                <button class="btn btn-success mt-2" onclick="buscarCoach()">Buscar</button>
            </div>

            <div class="row" id="listaCoaches"></div>
        `;

        document.getElementById("contenido").innerHTML = html;

        window.coachesGlobal = data;
        mostrarCoaches(data);
    });
}

function mostrarCoaches(data) {
    let html = "";

    data.forEach(c => {
        html += `
            <div class="col-md-4">
                <div class="card p-3 m-2 shadow">
                    <h5>${c.nombre}</h5>
                    <p>${c.especialidad}</p>
                    <span class="badge bg-success">${c.ciudad}</span>
                </div>
            </div>
        `;
    });

    document.getElementById("listaCoaches").innerHTML = html;
}

function buscarCoach() {
    const ciudad = document.getElementById("busqueda").value.toLowerCase();

    const filtrados = window.coachesGlobal.filter(c => 
        c.ciudad.toLowerCase().includes(ciudad)
    );

    mostrarCoaches(filtrados);
}
</script>

</body>
</html>
